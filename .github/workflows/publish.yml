name: Publish

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v5

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21

      - uses: gradle/actions/setup-gradle@v5

      - name: Assemble and check
        run: ./gradlew check assembleDebug -Pandroidx.baselineprofile.skipgeneration

      - name: Upload reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: reports
          path: |
            **/build/reports/**
            **/build/outputs/roborazzi/**

  detekt:
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v5

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21

      - uses: gradle/actions/setup-gradle@v5

      - name: Run Detekt
        run: ./gradlew detektFull

      - name: Upload Detekt reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: detekt-reports
          path: '**/build/reports/detekt/**'

  konsist:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v5

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21

      - uses: gradle/actions/setup-gradle@v5

      - name: Run Konsist tests
        run: ./gradlew :konsist:test

      - name: Upload Konsist reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: konsist-reports
          path: 'konsist/build/reports/tests/**'

  publish:
    runs-on: macos-latest
    needs: [ build, detekt, konsist ]
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21

      - uses: gradle/actions/setup-gradle@v5

      - name: Strip tag prefix to get version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Set release version in gradle.properties
        run: sed -i '' "s/^VERSION_NAME=.*/VERSION_NAME=${{ steps.version.outputs.VERSION }}/" gradle.properties

      - name: Publish to Maven Central
        run: ./gradlew publish --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.GPG_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_KEY_PASSWORD }}

  github-release:
    runs-on: ubuntu-latest
    needs: [ publish ]
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}

