name: Build

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # Skip build if head commit contains 'skip ci'
    if: "!contains(github.event.head_commit.message, 'skip ci')"

    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v5

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21

      - uses: gradle/actions/setup-gradle@v5

      - name: Assemble and check
        run: ./gradlew check assembleDebug -Pandroidx.baselineprofile.skipgeneration

      - name: Upload reports + Roborazzi outputs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: reports
          path: |
            **/build/reports/**
            **/build/outputs/roborazzi/**

  detekt:
    # Skip if head commit contains 'skip ci'
    if: "!contains(github.event.head_commit.message, 'skip ci')"

    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v5

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21

      - uses: gradle/actions/setup-gradle@v5

      - name: Run Detekt
        run: ./gradlew detektFull

      - name: Upload Detekt reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: detekt-reports
          path: '**/build/reports/detekt/**'

  konsist:
    # Skip if head commit contains 'skip ci'
    if: "!contains(github.event.head_commit.message, 'skip ci')"

    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v5

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21

      - uses: gradle/actions/setup-gradle@v5

      - name: Run Konsist tests
        run: ./gradlew :konsist:test

      - name: Upload Konsist reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: konsist-reports
          path: 'konsist/build/reports/tests/**'

  coverage:
    # Skip if head commit contains 'skip ci'
    if: "!contains(github.event.head_commit.message, 'skip ci')"

    runs-on: macos-latest
    needs: [ build ]
    timeout-minutes: 30
    # TODO: Remove continue-on-error once the kover convention plugin is applied to modules
    continue-on-error: true

    steps:
      - uses: actions/checkout@v6

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21

      - uses: gradle/actions/setup-gradle@v5

      - name: Generate Kover coverage report
        run: ./gradlew koverXmlReport

      - name: Upload coverage report
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: '**/build/reports/kover/**'
